name: Build Fences6

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIGURATION: Release
  WINDOWS_SDK_VERSION: '10.0.19041.41'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore NuGet packages
      run: |
        dotnet restore Fences6.sln
    
    - name: Build Solution
      run: |
        dotnet build Fences6.sln -c ${{ env.BUILD_CONFIGURATION }} --no-restore
    
    - name: Publish App
      run: |
        dotnet publish src/Fences6.App/Fences6.App.csproj `
          -c ${{ env.BUILD_CONFIGURATION }} `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o ./publish
    
    - name: List Publish Output
      run: |
        Get-ChildItem ./publish -Recurse | Select-Object Name, Length, LastWriteTime
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Fences6-win-x64-${{ github.run_number }}
        path: ./publish/Fences6.App.exe
        retention-days: 30
    
    - name: Create ZIP Archive
      if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath ./Fences6-${{ github.ref_name }}-win-x64.zip -Force
        Compress-Archive -Path ./publish/* -DestinationPath ./Fences6-latest-win-x64.zip -Force
    
    - name: Upload ZIP Asset
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./Fences6-${{ github.ref_name }}-win-x64.zip
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-native:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        architecture: [x64]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build C++ Native Library
      if: fileExists('./src/Fences6.Native')
      shell: pwsh
      run: |
        $projectPath = "./src/Fences6.Native/Fences6.Native.vcxproj"
        if (Test-Path $projectPath) {
          MSBuild $projectPath `
            -p:Configuration=Release `
            -p:Platform=${{ matrix.architecture }} `
            -p:PlatformToolset=v143 `
            -v:m
          Write-Host "Native library built successfully"
        } else {
          Write-Host "Native library project not found, skipping..."
        }
    
    - name: Upload Native Artifacts
      if: fileExists('./src/Fences6.Native')
      uses: actions/upload-artifact@v4
      with:
        name: Fences6.Native-${{ matrix.architecture }}
        path: |
          ./src/Fences6.Native/**/*.dll
          ./src/Fences6.Native/**/*.lib
        retention-days: 7

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: Fences6-win-x64-${{ github.run_number }}
        path: ./dist
    
    - name: Generate Release Notes
      id: release-notes
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        cat << 'EOF' > release_notes.md
        # Fences6 v${VERSION}
        
        ## Download
        Download `Fences6-${VERSION}-win-x64.zip` and extract to install.
        
        ## What's New
        Please check the [changelog](CHANGELOG.md) for details.
        
        ## Requirements
        - Windows 10 version 1903 or later
        - .NET 8.0 Runtime (included in self-contained build)
        
        ## Installation
        1. Extract the ZIP file
        2. Run `Fences6.App.exe`
        3. Enjoy your organized desktop!
        
        ## SHA256 Checksum
        ```
        $(CertUtil -hashfile ./dist/Fences6.App.exe SHA256 | Select-String -Pattern ':.*' -SimpleMatch)
        ```
        EOF
        echo "body_path=release_notes.md" >> $GITHUB_OUTPUT
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        body_path: release_notes.md
        files: ./dist/*
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: Fences6-win-x64-${{ github.run_number }}
        path: ./dist
    
    - name: Prepare Dockerfile
      run: |
        mkdir -p container
        cp ./dist/* container/
        cat << 'EOF' > container/Dockerfile
        FROM mcr.microsoft.com/windows/servercore:ltsc2022
        
        WORKDIR /app
        COPY . /app
        
        EXPOSE 8080
        
        ENTRYPOINT ["Fences6.App.exe"]
        EOF
    
    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and Push Container
      uses: docker/build-push-action@v5
      with:
        context: ./container
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/fences6:${{ github.ref_name }}
          ghcr.io/${{ github.repository_owner }}/fences6:latest
        platform: windows/amd64
