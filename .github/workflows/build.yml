name: Build Fences6

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore
      run: dotnet restore src/Fences6.App/Fences6.App.csproj
    
    - name: Publish
      run: |
        dotnet publish src/Fences6.App/Fences6.App.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -o ./dist
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Fences6
        path: ./dist/Fences6.exe
